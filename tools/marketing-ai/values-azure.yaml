# =========================
# Azure-specific overrides, to be changed by users as needed.
# =========================
# Only environment-specific configuration values - all ECR paths computed from ExternalGatewayHost
_storageClassName : &storageClassName "managed-csi"
_dagsStorageClassName: &dagsStorageClassName "azurefile-csi"
_ecrJobImage: &ecrJobImage "python:3.9-alpine"
_externalGatewayHost: &externalGatewayHost "extapigwservice-demo.cidemo.sas.com"
_k8sAuthSecretName: &k8s_auth_secret_name "ci360-api-credentials"
_connectionString: &azureConnectionString "<input-azure-storage-connection-string-here>"
_workloadIdentityClientId: &workloadIdentityClientId "<input-client-id-here>"
_agentpool: &agentpool "agentpool"
_remoteBaseLogFolder: &remoteBaseLogFolder "wasb://airflow-logs@<blob bucket name>.blob.core.windows.net/logs"

# =========================
# =========================

global:
  ExternalGatewayHost: *externalGatewayHost
  storagePrefix: azure
  k8s_auth_secret_name: *k8s_auth_secret_name
  ecr_job_image: *ecrJobImage
  storageBucket: "mai"
  azureStorage:
    connectionString: *azureConnectionString
  # Fleets connection settings - automatically passed to all subcharts
  fleets:
    # Connection mode: "gateway" (uses fleets proxy) or "direct" (direct to comm-gateway)
    mode: "gateway"
    # Fleets gateway hostname (used when mode = "gateway")
    hostName: ""
    # Tenant moniker passed in WebSocket connection URL
    tenant: "not_set"
    # Direct host name
    directHost: ""
  simpleAuthSecret: airflow-simple-auth-passwords
  simpleAuthPassword: "admin"

airflow:
  extraEnv: |
    - name: AIRFLOW__API__AUTH_BACKENDS
      value: 'airflow.api.auth.backend.default'
    - name: AIRFLOW__CORE__TEST_CONNECTION
      value: 'Enabled'
    - name: test_connection
      value: 'Enabled'
    - name: MAI_INTERNAL_STORAGE_PREFIX
      value: "{{ .Values.global.storagePrefix }}"
    - name: MAI_INTERNAL_STORAGE_BUCKET
      value: "{{ .Values.global.storageBucket }}"
    - name: AIRFLOW__CELERY__OPERATION_TIMEOUT
      value: '20'
    - name: AZURE_STORAGE_CONNECTION_STRING
      value: "{{ .Values.global.azureStorage.connectionString }}"
    - name: AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER
      value: "wasb-airflow-logs"
    - name: AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID
      value: "wasb_default"
    - name: AIRFLOW_CONN_WASB_DEFAULT
      value: '{"conn_type": "wasb", "login": "<input-storage-account-name-here>", "password": "<input-storage-account-key-here>"}'

  config:
    logging:
      remote_logging: "True"
      remote_base_log_folder: *remoteBaseLogFolder
    webserver:
      enable_proxy_fix: "True"

  apiServer:
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: *workloadIdentityClientId
      
  workers:
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: *workloadIdentityClientId
    persistence:
      storageClassName: *storageClassName

  triggerer:
    persistence:
      storageClassName: *storageClassName

  redis:
    persistence:
      storageClassName: *storageClassName

  airflowPodAnnotations:
    azure.workload.identity/use: "true"
  
  labels:
    app.kubernetes.io/managed-by: "Helm"
    azure.workload.identity/use: "true"
  
  nodeSelector:
    agentpool: *agentpool

postgresql-ha:
  postgresql:
    nodeSelector:
      agentpool: *agentpool
  pgpool:
    nodeSelector:
      agentpool: *agentpool
  persistence:
    storageClass: *storageClassName
    
ci360-satellite:
  dags:
    persistence:
      storageClassName: *dagsStorageClassName
  
  maiproxy:
    nodeSelector:
      karpenter.sh/capacity-type: null
      agentpool: *agentpool
    environment:
      MAI_INTERNAL_STORAGE_PREFIX: azure
      MAI_INTERNAL_STORAGE_BUCKET: mai #use from global values, or use anchors.
  
  maiorchestra:
    nodeSelector:
      agentpool: *agentpool
      karpenter.sh/capacity-type: null
  
  serviceAccount:
    annotations:
      azure.workload.identity/client-id: *workloadIdentityClientId

# Helm test job configuration
helmtestjob:
  image:
    tag: "lic_mai.mai-helm-tests"

redis:
  auth:
    password: "my-redis-password"
  master:
    nodeSelector:
      agentpool: *agentpool

# Fleet authentication settings (only used when global.fleets.mode = "gateway")
# For customer installations: pre-create a K8s secret and reference it via existingSecret
# For CI/CD: pass credentials via --set from pipeline secrets
#
# NOTE: Auth jobs are automatically created when mode = "gateway" and skipped when mode = "direct"
#       Connection settings (mode, hostName, directHost, tenant) are in global.fleets above
fleets:
  # Authentication credentials
  # Option 1 (RECOMMENDED for production): 
  # Then set existingSecret to the secret name: {{ .Values.global.k8s_auth_secret_name }}
  existingSecret: ""
  
  # Option 2 (for CI/CD): Inline values - pass via --set from pipeline secrets
  # These are ignored if existingSecret is set
  username: ""
  key: ""
  keepHook: true
